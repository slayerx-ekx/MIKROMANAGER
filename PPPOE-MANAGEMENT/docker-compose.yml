version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mikrotik_mysql
    restart: unless-stopped
    command: --default-time-zone=+07:00
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mikrotik_ppp
      MYSQL_USER: mikrotik
      MYSQL_PASSWORD: mikrotik123
      TZ: Asia/Jakarta
      MYSQL_INITDB_SKIP_TZINFO: "1"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    networks:
      - mikrotik_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=rootpassword"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mikrotik_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: mikrotik
      DB_PASSWORD: mikrotik123
      DB_NAME: mikrotik_ppp
      APP_PORT: 8889
      APP_ENV: production
      JWT_SECRET: mikromanager-jwt-secret-key-change-this-in-prod
      OLT_POLL_INTERVAL_SECONDS: 60
      TZ: Asia/Jakarta
    ports:
      - "8889:8889"
    networks:
      - mikrotik_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mikrotik_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8888:80"
    environment:
      TZ: Asia/Jakarta
    networks:
      - mikrotik_net

volumes:
  mysql_data:

networks:
  mikrotik_net:
    driver: bridge
