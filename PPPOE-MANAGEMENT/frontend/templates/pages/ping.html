{{ define "page_ping" }}
    <div id="page-ping" class="page">
      <div style="max-width:580px">
        <div class="panel">
          <div class="panel-hdr"><h3>Network Ping Tool</h3></div>
          <div class="panel-body">
            <div class="form-row"><label class="form-lbl">Router Sumber</label><select id="ping-router" class="form-inp"><option value="">-- Pilih Router --</option></select></div>
            <div class="form-row"><label class="form-lbl">Target IP / Domain</label><input id="ping-target" type="text" class="form-inp" placeholder="8.8.8.8 atau google.com" onkeydown="if(event.key==='Enter')doPing()"></div>
            <div class="form-row"><label class="form-lbl">Jumlah Ping</label><select id="ping-count" class="form-inp"><option value="4">4x</option><option value="8">8x</option><option value="10">10x</option></select></div>
            <button id="ping-btn" class="btn btn-blue" style="width:100%;justify-content:center" onclick="doPing()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
              Jalankan Ping
            </button>
          </div>
        </div>
        <div id="ping-result" class="panel" style="display:none">
          <div class="panel-hdr"><h3>Hasil Ping</h3><span id="ping-summary" style="font-size:12px;color:var(--muted)"></span></div>
          <div class="panel-body"><div id="ping-out" class="font-mono" style="font-size:13px;line-height:1.7;max-height:280px;overflow-y:auto"></div></div>
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
{{ end }}
