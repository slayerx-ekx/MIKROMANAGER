{{ define "page_traffic" }}
    <div id="page-traffic" class="page">
      <div class="panel">
        <div class="panel-body">
          <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
            <div style="flex:2;min-width:200px"><label class="form-lbl">Pilih Router</label><select id="traf-router" class="form-inp"><option value="">-- Pilih Router --</option></select></div>
            <div style="flex:1;min-width:140px"><label class="form-lbl">Interval</label><select id="traf-interval" class="form-inp"><option value="3000">3 detik</option><option value="5000" selected>5 detik</option><option value="10000">10 detik</option></select></div>
            <button id="traf-btn" class="btn btn-green" onclick="toggleTraffic()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              Start Monitor
            </button>
          </div>
        </div>
      </div>
      <div id="traf-cards" class="grid3" style="margin-bottom:16px"></div>
      <div id="traf-chart-panel" class="panel" style="display:none">
        <div class="panel-hdr"><h3>Traffic History — <span id="traf-iface" style="color:#fb923c"></span></h3></div>
        <div class="panel-body" style="height:260px;position:relative"><canvas id="traf-chart"></canvas></div>
      </div>
    </div>

    <!-- PING -->
{{ end }}
