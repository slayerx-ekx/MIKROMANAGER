{{ define "page_user_monitoring" }}
    <div id="page-usermon" class="page">
      <div class="panel">
        <div class="panel-hdr"><h3>User Monitoring Builder</h3></div>
        <div class="panel-body">
          <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
            <div style="flex:2;min-width:220px"><label class="form-lbl">Router</label><select id="usermon-router" class="form-inp"><option value="">-- Pilih Router --</option></select></div>
            <div style="flex:1;min-width:200px"><label class="form-lbl">Nama Widget</label><input id="usermon-title" class="form-inp" placeholder="Contoh: PPP RO Core"></div>
            <div style="flex:1;min-width:150px"><label class="form-lbl">Sumber Data</label><select id="usermon-source" class="form-inp"><option value="api" selected>API</option><option value="snmp">SNMP</option></select></div>
            <div style="flex:1;min-width:140px"><label class="form-lbl">Refresh</label><select id="usermon-interval" class="form-inp"><option value="3000">3 detik</option><option value="5000" selected>5 detik</option><option value="10000">10 detik</option><option value="15000">15 detik</option></select></div>
            <div style="flex:1;min-width:140px"><label class="form-lbl">Layout</label><select id="usermon-layout" class="form-inp" onchange="setUserMonLayoutMode(this.value)"><option value="auto" selected>Otomatis</option><option value="1x1">1x1</option><option value="1x2">1x2</option><option value="1x3">1x3</option><option value="2x1">2x1</option><option value="2x2">2x2</option><option value="2x3">2x3</option><option value="3x1">3x1</option><option value="3x2">3x2</option><option value="3x3">3x3</option></select></div>
            <button class="btn btn-primary" onclick="addUserMonWidget()">Tambah Widget</button>
            <button class="btn btn-secondary" onclick="autoArrangeUserMonWidgets()">Auto Layout</button>
            <button class="btn btn-secondary" id="usermon-wall-btn" onclick="toggleUserMonWallMode()">Mode Monitor</button>
            <button class="btn btn-secondary" onclick="clearUserMonLayout()">Reset Layout</button>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.35">Gunakan <span class="font-mono">API</span> untuk data lengkap termasuk <span class="font-mono">last-link-down/up</span>. Gunakan <span class="font-mono">SNMP</span> untuk mode ringan dengan <span class="font-mono">oper status</span> dan <span class="font-mono">last change</span> interface. <span class="font-mono">Auto Layout</span> dan <span class="font-mono">Mode Monitor</span> cocok untuk wall monitoring.</div>
        </div>
      </div>
      <div id="usermon-workspace" class="nms-workspace usermon-workspace"></div>
    </div>

    <!-- TRAFFIC -->
{{ end }}
