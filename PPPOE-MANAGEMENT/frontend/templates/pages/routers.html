{{ define "page_routers" }}
    <div id="page-routers" class="page">
      <div class="panel" style="margin-bottom:16px">
        <div class="panel-body">
          <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
            <div style="flex:2;min-width:240px">
              <label class="form-lbl">Cari Router</label>
              <input id="routers-search" class="form-inp" placeholder="Cari nama, IP, username, email..." oninput="debounceRouters()">
            </div>
            <div style="flex:1;min-width:150px">
              <label class="form-lbl">Tampilkan</label>
              <select id="routers-limit" class="form-inp" onchange="loadRouters(1)">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
            <button class="btn btn-secondary" onclick="clearRouterFilters()">Reset</button>
            <button class="btn btn-primary" onclick="openRouterModal(0)">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              Tambah Router Baru
            </button>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><h3>Daftar Router</h3></div>
        <div class="overflow-x">
          <table class="tbl mobile-stack-table">
            <thead><tr><th>No</th><th>Nama Router</th><th>IP Address</th><th>Username</th><th>Port API</th><th>Email</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="routers-tbody"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
          </table>
        </div>
        <div style="padding:12px 16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div id="routers-info" style="font-size:12px;color:var(--muted)"></div>
          <div id="routers-pages" class="pagination"></div>
        </div>
      </div>
    </div>

    <!-- USERS -->
{{ end }}
