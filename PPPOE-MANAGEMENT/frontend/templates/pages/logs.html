{{ define "page_logs" }}
    <div id="page-logs" class="page">
      <div class="panel" style="margin-bottom:16px">
        <div class="panel-hdr">
          <div>
            <h3>Log Troubleshoot Administrator</h3>
            <div style="font-size:12px;color:var(--muted);margin-top:4px">Pusat log global untuk SNMP, Telnet, sinkronisasi, kualitas data, dan issue dari seluruh menu operasional tanpa perlu membuka terminal server.</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="loadLogs()">Refresh</button>
        </div>
        <div class="toolbar logs-toolbar">
          <input id="troubleshoot-search" placeholder="Cari serial number, ONU interface, IP OLT, atau pesan error..." oninput="loadLogs()">
          <select id="troubleshoot-source" onchange="loadLogs()">
            <option value="">Semua Source</option>
            <option value="router_management">Router Management</option>
            <option value="pppoe_management">PPPoE Management</option>
            <option value="user_monitoring">User Monitoring</option>
            <option value="traffic_monitor">Traffic Monitor</option>
            <option value="nms">NMS</option>
            <option value="sync">Sync Router</option>
            <option value="noc_tools">NOC Tools</option>
            <option value="olt_noc">OLT NOC</option>
            <option value="user_management">User Management</option>
            <option value="telnet_enrichment">Telnet</option>
            <option value="snmp_connect">SNMP Connect</option>
            <option value="snmp_discovery">SNMP Discovery</option>
            <option value="snmp_profile">SNMP Profile</option>
            <option value="olt_sync">OLT Sync</option>
            <option value="olt_data_quality">Data Quality</option>
          </select>
          <select id="troubleshoot-level" onchange="loadLogs()">
            <option value="">Semua Level</option>
            <option value="error">Error</option>
            <option value="warn">Warning</option>
            <option value="info">Info</option>
          </select>
          <select id="troubleshoot-limit" onchange="loadLogs()">
            <option value="50">50 data</option>
            <option value="100" selected>100 data</option>
            <option value="200">200 data</option>
          </select>
        </div>
        <div id="troubleshoot-bulk-actions" class="log-bulk-actions" style="display:none">
          <label class="log-select-all"><input type="checkbox" id="troubleshoot-select-all" onchange="toggleTroubleshootSelectAll(this.checked)"> Pilih semua yang tampil</label>
          <div class="gap-row">
            <span id="troubleshoot-selected-count" class="log-selected-count">0 dipilih</span>
            <button class="btn btn-red btn-sm" onclick="deleteSelectedTroubleshootLogs()">Hapus Dipilih</button>
          </div>
        </div>
        <div id="logs-body"><div class="empty">Loading...</div></div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><h3>Riwayat Sinkronisasi Router</h3><button class="btn btn-secondary btn-sm" onclick="loadLogs()">Refresh</button></div>
        <div id="sync-logs-body"><div class="empty">Loading...</div></div>
      </div>
    </div>
{{ end }}
