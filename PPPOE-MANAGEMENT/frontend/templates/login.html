<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MikroManager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030712;
  --panel:#0f172a;
  --line:#1e293b;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --input:#1e293b;
  --input-line:#334155;
  --accent:#ea580c;
  --accent-strong:#c2410c;
  --glow:rgba(234,88,12,.18);
}
body[data-theme="light"]{--bg:#eef4ff;--panel:#ffffff;--line:#d7e3f4;--text:#0f172a;--muted:#475569;--input:#ffffff;--input-line:#cbd5e1;--accent:#2563eb;--accent-strong:#1d4ed8;--glow:rgba(37,99,235,.18)}
body[data-theme="ocean"]{--bg:#041c2f;--panel:#08263a;--line:#164a63;--text:#e0f2fe;--muted:#8ecae6;--input:#0d3249;--input-line:#2f6784;--accent:#06b6d4;--accent-strong:#0891b2;--glow:rgba(6,182,212,.18)}
body[data-theme="forest"]{--bg:#08140d;--panel:#0f1f16;--line:#294234;--text:#ecfdf5;--muted:#9fc4aa;--input:#16291d;--input-line:#3d5c47;--accent:#16a34a;--accent-strong:#15803d;--glow:rgba(22,163,74,.18)}
body[data-theme="sunset"]{--bg:#1b1020;--panel:#23142a;--line:#4e2f52;--text:#fff1f2;--muted:#f0b6b8;--input:#351d39;--input-line:#744768;--accent:#f97316;--accent-strong:#c2410c;--glow:rgba(249,115,22,.18)}
body[data-theme="aurora"]{--bg:#07141f;--panel:#112131;--line:#25445d;--text:#effcff;--muted:#9ec7d8;--input:#173247;--input-line:#37617c;--accent:#22c55e;--accent-strong:#15803d;--glow:rgba(34,197,94,.18)}
body[data-theme="graphite"]{--bg:#111827;--panel:#192235;--line:#334155;--text:#f8fafc;--muted:#a8b3c5;--input:#243047;--input-line:#475569;--accent:#38bdf8;--accent-strong:#2563eb;--glow:rgba(56,189,248,.16)}
body[data-theme="rose"]{--bg:#25111b;--panel:#311625;--line:#6b3148;--text:#fff7fb;--muted:#f2b7cb;--input:#472033;--input-line:#8c4563;--accent:#ec4899;--accent-strong:#db2777;--glow:rgba(236,72,153,.18)}
body[data-theme="sand"]{--bg:#f5efe4;--panel:#fffdfa;--line:#dccfb9;--text:#3b2f23;--muted:#7b6a56;--input:#fffdfa;--input-line:#cdbda3;--accent:#b45309;--accent-strong:#92400e;--glow:rgba(180,83,9,.16)}
body{font-family:'Inter',sans-serif;background:radial-gradient(ellipse at 50% 0%,var(--glow) 0%,transparent 60%),var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;background-attachment:fixed}
.card{background:linear-gradient(180deg,color-mix(in srgb, var(--panel) 98%, transparent),color-mix(in srgb, var(--panel) 90%, transparent));border:1px solid var(--line);border-radius:18px;padding:36px;width:100%;max-width:380px;box-shadow:0 25px 50px rgba(0,0,0,0.35)}
.logo{display:flex;flex-direction:column;align-items:center;margin-bottom:28px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb, var(--accent-strong) 92%, black 8%));border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 8px 20px var(--glow)}
.logo h1{font-size:20px;font-weight:700;color:var(--text)}
.logo p{font-size:12px;color:var(--muted);margin-top:2px}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px}
input{width:100%;background:var(--input);border:1px solid var(--input-line);color:var(--text);border-radius:8px;padding:10px 14px;font-size:14px;outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:transform .15s,filter .15s}
.btn-login:hover{filter:brightness(1.03);transform:translateY(-1px)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);color:#fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.hint{text-align:center;font-size:12px;color:var(--muted);margin-top:20px;padding-top:20px;border-top:1px solid var(--line)}
.pass-wrap{position:relative}
.pass-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="28" height="28" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/></svg>
    </div>
    <h1>MikroManager</h1>
    <p>PPP Management System</p>
  </div>
  <div class="error" id="err"></div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="u" placeholder="admin" autofocus>
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="pass-wrap">
      <input type="password" id="p" placeholder="••••••••">
      <button class="pass-toggle" onclick="togglePass()" type="button">
        <svg id="eye" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
      </button>
    </div>
  </div>
  <button class="btn-login" id="btn" onclick="doLogin()">Masuk</button>
  <div class="hint">Default: <strong>admin</strong> / <strong>admin123</strong></div>
</div>
<script>
function applyLoginTheme(name){
  var allowed = ['dark','light','ocean','forest','sunset','aurora','graphite','rose','sand'];
  var theme = allowed.indexOf((name || '').toLowerCase()) >= 0 ? name.toLowerCase() : 'dark';
  document.body.setAttribute('data-theme', theme);
}
function togglePass(){const p=document.getElementById('p');p.type=p.type==='password'?'text':'password'}
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
async function doLogin(){
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('btn');
  if(!u||!p){err.textContent='Username dan password wajib diisi';err.style.display='block';return}
  btn.disabled=true;btn.textContent='Masuk...';err.style.display='none';
  try{
    const r=await fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.success){
      localStorage.setItem('token',d.data.token);
      localStorage.setItem('username',d.data.username);
      localStorage.setItem('full_name',d.data.full_name||d.data.username);
      localStorage.setItem('role',d.data.role);
      try {
        const me = await fetch('/api/v1/auth/me',{headers:{'Authorization':'Bearer '+d.data.token}});
        const meData = await me.json();
        if(meData.data && meData.data.user_id) localStorage.setItem('user_id', meData.data.user_id);
      } catch(e) {}
      window.location.href='/';
    }else{err.textContent=d.message||'Login gagal';err.style.display='block';}
  }catch(e){err.textContent='Tidak dapat terhubung ke server';err.style.display='block';}
  btn.disabled=false;btn.textContent='Masuk';
}
applyLoginTheme(localStorage.getItem('app_theme') || 'dark');
if(localStorage.getItem('token'))window.location.href='/';
</script>
</body>
</html>
