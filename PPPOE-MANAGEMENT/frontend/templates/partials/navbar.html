{{ define "navbar" }}
  <div id="header">
    <div id="header-left">
      <button id="menu-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div>
      <div id="hdr-title" style="font-size:16px;font-weight:700;color:var(--text)">Dashboard</div>
      <div id="hdr-sub" style="font-size:12px;color:var(--muted);margin-top:1px">Overview sistem monitoring</div>
      </div>
    </div>
    <div id="header-actions">
      <div id="olt-topbar-controls" style="display:none;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="header-ops-bar">
          <label class="header-search-shell" for="olt-global-search">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15z"/></svg>
            <input id="olt-global-search" type="text" placeholder="Cari ONU / SN / PPPoE" onkeydown="if(event.key==='Enter')runOLTGlobalSearch()">
          </label>
          <select id="olt-global-select" class="form-inp" onchange="selectOLT(this.value, false)">
            <option value="">Pilih OLT</option>
          </select>
          <button class="btn btn-secondary btn-sm header-compact-btn" onclick="loadOLTOnus(true)">Sync</button>
        </div>
      </div>
      <div class="header-alert-wrap">
        <button type="button" id="olt-alert-cta" class="header-alert-btn" title="Global Notification" onclick="toggleGlobalNotifications()">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2a2 2 0 01-.6 1.4L4 17h5m6 0a3 3 0 11-6 0m6 0H9"/></svg>
          <span id="olt-alert-count">0</span>
        </button>
        <div id="global-notification-panel" class="header-notification-panel">
          <div class="header-notification-head">
            <div>
              <strong>Global Notification</strong>
              <span>Ringkasan alarm dan issue aktif dari seluruh modul operasional akan tampil di sini.</span>
            </div>
            <button class="btn btn-secondary btn-sm header-compact-btn" style="width:auto" onclick="openGlobalAlarmCenter()">Open Logs</button>
          </div>
          <div id="global-notification-list" class="header-notification-list"><div class="empty">Belum ada notifikasi aktif.</div></div>
          <div class="header-notification-actions">
            <button class="btn btn-secondary btn-sm" onclick="closeGlobalNotifications()">Tutup</button>
            <button class="btn btn-primary btn-sm" onclick="openGlobalAlarmCenter()">Log Troubleshoot</button>
          </div>
        </div>
      </div>
      <div id="syncing-badge" style="display:none;align-items:center;gap:6px;font-size:12px;color:#fb923c;background:rgba(234,88,12,.15);padding:6px 12px;border-radius:20px">
        <span class="dot-live" style="width:6px;height:6px"></span> Syncing...
      </div>
      <button class="btn btn-primary" onclick="doSyncAll()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Refresh Data
      </button>
    </div>
  </div>
{{ end }}
