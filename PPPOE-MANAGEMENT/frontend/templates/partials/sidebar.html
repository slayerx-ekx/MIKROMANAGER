{{ define "sidebar" }}
<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-brand" class="sidebar-brand">
    <div class="sidebar-mark">
      <svg width="20" height="20" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/></svg>
    </div>
    <div class="sidebar-brand-copy"><div class="sidebar-brand-title">MikroManager</div><div class="sidebar-brand-sub">PPP Management</div></div>
    <button class="sidebar-collapse-btn" type="button" onclick="toggleSidebarCollapse()" title="Collapse sidebar">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
  </div>

  <div id="sidebar-nav" class="nav-shell">
    <div class="nav-section" id="nav-section-main">Main</div>
    <button class="nav-btn" id="nav-dashboard" onclick="gotoPage('dashboard')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
      Dashboard
    </button>

    <div class="nav-section" id="nav-section-management">Management</div>
    <button class="nav-btn" id="nav-routers" onclick="gotoPage('routers')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/></svg>
      Management Router
    </button>
    <button class="nav-btn" id="nav-monitoring" onclick="gotoPage('monitoring')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      PPPOE Management
    </button>
    <!-- HIDDEN: Monitoring section - hidden by design, do not delete -->
    <div class="nav-section" id="nav-section-monitoring" style="display:none">Monitoring</div>
    <button class="nav-btn" id="nav-usermon" onclick="gotoPage('usermon')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5V4H2v16h5m10 0v-5a3 3 0 00-3-3H10a3 3 0 00-3 3v5m10 0H7m8-13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      User Monitoring
    </button>
    <button class="nav-btn" id="nav-traffic" onclick="gotoPage('traffic')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
      Traffic Monitor
    </button>
    <button class="nav-btn" id="nav-nms" onclick="gotoPage('nms')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"/></svg>
      NMS
    </button>

    <!-- HIDDEN: OLT NOC section - hidden by design, do not delete -->
    <div class="nav-section" id="nav-section-olt" style="display:none">OLT NOC</div>
    <div class="nav-subsection" style="display:none">OLT C320</div>
    <button class="nav-btn" id="nav-olt-dashboard" onclick="gotoPage('olt-dashboard')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 13h8V3H3v10zm10 8h8V3h-8v18zm-10 0h8v-6H3v6z"/></svg>
      OLT Monitoring
    </button>
    <button class="nav-btn" id="nav-olt-device" onclick="gotoPage('olt-device')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M7 7v10m10-10v10M5 17h14M9 11h6"/></svg>
      OLT Management
    </button>
    <button class="nav-btn" id="nav-olt-detail" onclick="gotoPage('olt-detail')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-6h13M9 5h13M4 5h.01M4 11h.01M4 17h.01"/></svg>
      OLT STATS
    </button>
    <button class="nav-btn" id="nav-olt-user-management" onclick="gotoPage('olt-user-management')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5V4H2v16h5m10 0v-5a3 3 0 00-3-3H10a3 3 0 00-3 3v5m10 0H7m8-13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      ONU Management
    </button>
    <button class="nav-btn" id="nav-olt-activation" onclick="gotoPage('olt-activation')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      Activation ONU
    </button>
    <button class="nav-btn" id="nav-olt-troubleshoot" onclick="gotoPage('olt-troubleshoot')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 3a3 3 0 00-3 3v.75H6a2.25 2.25 0 00-2.25 2.25v3A2.25 2.25 0 006 14.25h.75V18a3 3 0 003 3h4.5a3 3 0 003-3v-3.75H18A2.25 2.25 0 0020.25 12v-3A2.25 2.25 0 0018 6.75h-.75V6a3 3 0 00-3-3h-4.5zM9 6a.75.75 0 01.75-.75h4.5A.75.75 0 0115 6v.75H9V6zm1.5 5.25h3m-3 3h3"/></svg>
      Trouble Shoot OLT
    </button>
    <div class="nav-subsection" style="display:none">OLT HIOSO EPON</div>
    <button class="nav-btn" id="nav-olt-hioso-monitoring" onclick="gotoPage('olt-hioso-monitoring')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 13h8V3H3v10zm10 8h8V3h-8v18zm-10 0h8v-6H3v6z"/></svg>
      Monitoring <span class="nav-badge">Soon</span>
    </button>
    <button class="nav-btn" id="nav-olt-hioso-management" onclick="gotoPage('olt-hioso-management')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M7 7v10m10-10v10M5 17h14M9 11h6"/></svg>
      Management <span class="nav-badge">Soon</span>
    </button>
    <div class="nav-subsection" style="display:none">OLT GLOBAL EPON</div>
    <button class="nav-btn" id="nav-olt-global-monitoring" onclick="gotoPage('olt-global-monitoring')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 13h8V3H3v10zm10 8h8V3h-8v18zm-10 0h8v-6H3v6z"/></svg>
      Monitoring <span class="nav-badge">Soon</span>
    </button>
    <button class="nav-btn" id="nav-olt-global-management" onclick="gotoPage('olt-global-management')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M7 7v10m10-10v10M5 17h14M9 11h6"/></svg>
      Management <span class="nav-badge">Soon</span>
    </button>

    <!-- HIDDEN: NOC Tools section - hidden by design, do not delete -->
    <div class="nav-section" id="nav-section-noc" style="display:none">NOC Tools</div>
    <button class="nav-btn" id="nav-ping" onclick="gotoPage('ping')" style="display:none">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
      Network Ping
    </button>

    <div class="nav-section" id="nav-section-settings">Settings</div>
    <button class="nav-btn" id="nav-settings" onclick="gotoPage('settings')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h10M4 17h16M14 7l2.5-2.5M8 17l2.5-2.5M14 7l2.5 2.5M8 17l2.5 2.5"/></svg>
      Settings
    </button>
    <button class="nav-btn" id="nav-users" onclick="gotoPage('users')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      User Management
    </button>
    <button class="nav-btn" id="nav-logs" onclick="gotoPage('logs')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Log Troubleshoot
    </button>
  </div>

  <!-- User info -->
  <div style="padding:12px;border-top:1px solid var(--line)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:10px">
        <div id="s-avatar" class="avatar" style="background:#ea580c">A</div>
        <div class="user-info-copy">
          <div id="s-name" style="font-size:13px;font-weight:600;color:var(--text)">Admin</div>
          <div id="s-role" style="font-size:11px;color:var(--muted)">administrator</div>
        </div>
      </div>
      <button onclick="showLogoutConfirm()" title="Logout" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;display:flex" onmouseover="this.style.color='#f87171'" onmouseout="this.style.color='var(--muted)'">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </button>
    </div>
    <div class="sync-card" style="background:var(--panel-soft);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--muted)">Auto Sync</span>
        <span id="sync-badge" style="font-size:11px;font-weight:600;background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3);padding:2px 8px;border-radius:10px">ON</span>
      </div>
      <div id="last-sync-txt" style="font-size:11px;color:var(--muted);margin-top:3px">-</div>
    </div>
  </div>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>
{{ end }}
