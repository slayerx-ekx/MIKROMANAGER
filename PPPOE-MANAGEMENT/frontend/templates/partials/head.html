/* SIDEBAR */
#sidebar{width:280px;min-width:280px;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;box-shadow:20px 0 40px rgba(2,6,23,.28);transition:transform .25s ease,width .22s ease,min-width .22s ease}
#main{margin-left:280px;flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0;transition:margin-left .22s ease}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(2,6,23,.7);backdrop-filter:blur(2px);z-index:95}
body.sidebar-collapsed #sidebar{width:76px;min-width:76px}
body.sidebar-collapsed #main{margin-left:76px}
.sidebar-brand{padding:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.sidebar-mark{width:36px;height:36px;background:#ea580c;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-brand-copy{min-width:0;flex:1}
.sidebar-brand-title{font-weight:700;font-size:14px;color:var(--text);white-space:nowrap}
.sidebar-brand-sub{font-size:11px;color:var(--muted);white-space:nowrap}
.sidebar-collapse-btn{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--panel-soft);color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
.sidebar-collapse-btn:hover{color:var(--text);background:var(--nav-hover-bg)}
.sidebar-collapse-btn svg{width:15px;height:15px}
body.sidebar-collapsed .sidebar-brand{justify-content:center;flex-direction:column;padding:12px 8px;gap:8px}
body.sidebar-collapsed .sidebar-brand-copy,body.sidebar-collapsed #sidebar .user-info-copy,body.sidebar-collapsed #sidebar .sync-card{display:none !important}
body.sidebar-collapsed .sidebar-collapse-btn{display:flex !important}
body.sidebar-collapsed .sidebar-collapse-btn svg{transform:rotate(180deg)}

/* NAV */
.nav-section{font-size:10px;font-weight:700;color:var(--section-text);text-transform:uppercase;letter-spacing:.08em;padding:12px 16px 4px}
.nav-btn{display:flex;align-items:center;gap:10px;width:calc(100% - 16px);margin:1px 8px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;color:var(--nav-text);background:none;border:none;text-align:left;transition:all .15s}
.nav-btn:hover{background:var(--nav-hover-bg);color:var(--nav-hover-text)}
.nav-btn.active{background:linear-gradient(135deg,var(--accent),#f97316);color:#fff;box-shadow:0 10px 22px color-mix(in srgb, var(--accent) 32%, transparent)}
.nav-btn svg{width:16px;height:16px;flex-shrink:0}
.nav-shell{padding:8px 0 12px;flex:1}
.nav-group{display:grid;gap:2px}
.nav-parent{font-weight:700}
.nav-parent .nav-label{flex:1}
.nav-chevron{width:14px;height:14px;transition:transform .18s ease}
.nav-group.open .nav-chevron{transform:rotate(90deg)}
.nav-children{max-height:0;overflow:hidden;transition:max-height .24s ease}
.nav-group.open .nav-children{max-height:900px}
.nav-subsection{font-size:9px;font-weight:800;color:var(--section-text);text-transform:uppercase;letter-spacing:.08em;padding:9px 18px 3px}
.nav-child{padding-left:20px}
.nav-child svg{width:15px;height:15px}
.nav-badge{margin-left:auto;font-size:9px;font-weight:800;line-height:1;padding:3px 6px;border-radius:999px;background:rgba(245,158,11,.14);color:#f59e0b;border:1px solid rgba(245,158,11,.28)}
.nav-group.has-active>.nav-parent{color:var(--nav-hover-text);background:color-mix(in srgb,var(--nav-hover-bg) 72%,transparent)}
body.sidebar-collapsed .nav-section,body.sidebar-collapsed .nav-label,body.sidebar-collapsed .nav-badge,body.sidebar-collapsed .nav-chevron,body.sidebar-collapsed .nav-subsection{display:none}
body.sidebar-collapsed .nav-btn{width:44px;height:44px;margin:4px auto;padding:0;justify-content:center}
body.sidebar-collapsed .nav-children{display:none}

/* HEADER */
#header{position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--header-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;z-index:50;min-height:var(--header-h)}
#header-left{display:flex;align-items:center;gap:14px;min-width:0}
#menu-toggle{display:none;align-items:center;justify-content:center;width:42px;height:42px;border-radius:12px;border:1px solid var(--line-soft);background:linear-gradient(180deg,var(--panel),var(--panel-soft));color:var(--text);box-shadow:0 10px 24px color-mix(in srgb, var(--line-soft) 28%, transparent)}
#menu-toggle svg{width:18px;height:18px}
#header-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
.header-ops-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 10px;border-radius:18px;border:1px solid var(--line);background:color-mix(in srgb,var(--panel) 94%,transparent);box-shadow:0 14px 26px rgba(15,23,42,.05)}
.header-search-shell{display:flex;align-items:center;gap:10px;min-width:min(100%,250px);padding:0 12px;height:38px;border-radius:12px;border:1px solid var(--line);background:color-mix(in srgb,var(--panel-soft) 74%,transparent);color:var(--muted)}
.header-search-shell input{border:none;outline:none;background:transparent;color:var(--text);width:100%;font-size:13px}
.header-search-shell input::placeholder{color:var(--muted)}
.header-ops-bar .form-inp{min-width:210px;height:38px;border-radius:12px}
.header-compact-btn{height:38px;padding:0 14px;border-radius:12px}
.header-alert-wrap{position:relative}
.header-alert-btn{display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 12px;border-radius:12px;border:1px solid rgba(239,68,68,.18);background:rgba(239,68,68,.08);color:#ef4444;font-size:12px;font-weight:800;cursor:pointer}
.header-alert-btn span{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 6px;border-radius:999px;background:rgba(255,255,255,.86);color:#dc2626}
body:not([data-theme="light"]) .header-alert-btn span{background:rgba(15,23,42,.82);color:#fecaca}
.header-notification-panel{position:absolute;right:0;top:46px;width:min(360px,calc(100vw - 24px));display:none;gap:10px;padding:12px;border-radius:18px;border:1px solid rgba(148,163,184,.22);background:rgba(255,255,255,.96);box-shadow:0 28px 56px rgba(15,23,42,.16);backdrop-filter:blur(16px);z-index:120}
body:not([data-theme="light"]) .header-notification-panel{background:rgba(15,23,42,.96);border-color:rgba(96,165,250,.16);box-shadow:0 28px 56px rgba(2,6,23,.44)}
.header-notification-panel.show{display:grid}
.header-notification-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.header-notification-head strong{font-size:14px;color:var(--text)}
.header-notification-head span{font-size:12px;color:var(--muted);line-height:1.55}
.header-notification-list{display:grid;gap:8px;max-height:360px;overflow:auto}
.header-notification-item{display:grid;gap:5px;padding:12px 13px;border-radius:14px;border:1px solid var(--line);background:color-mix(in srgb,var(--panel-soft) 84%,transparent)}
.header-notification-item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.header-notification-item strong{font-size:13px;color:var(--text)}
.header-notification-item span{font-size:12px;color:var(--muted);line-height:1.55}
.header-notification-dismiss{width:24px;height:24px;border-radius:8px;border:1px solid var(--line);background:color-mix(in srgb,var(--panel) 88%,transparent);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.header-notification-dismiss:hover{color:#ef4444;border-color:rgba(239,68,68,.24);background:rgba(239,68,68,.08)}
.header-notification-item.is-critical{border-color:rgba(239,68,68,.28);background:rgba(254,242,242,.92)}
.header-notification-item.is-warning{border-color:rgba(245,158,11,.28);background:rgba(255,251,235,.92)}
.header-notification-item.is-info{border-color:rgba(37,99,235,.22);background:rgba(239,246,255,.92)}
body:not([data-theme="light"]) .header-notification-item.is-critical{background:rgba(127,29,29,.16)}
body:not([data-theme="light"]) .header-notification-item.is-warning{background:rgba(120,53,15,.18)}
body:not([data-theme="light"]) .header-notification-item.is-info{background:rgba(30,41,59,.62)}
.header-notification-actions{display:flex;gap:10px;flex-wrap:wrap}

/* CONTENT */
#content{padding:22px;flex:1;min-width:0}
.page{display:none}
.page.active{display:block}
.coming-soon-page{min-height:calc(100vh - 150px);display:flex;align-items:center;justify-content:center;gap:18px;padding:28px;border:1px dashed var(--line-soft);border-radius:22px;background:linear-gradient(180deg,var(--panel-grad-top),var(--panel-grad-bottom));text-align:left}
.coming-soon-icon{width:58px;height:58px;border-radius:18px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.coming-soon-icon svg{width:28px;height:28px}
.coming-soon-kicker{font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.coming-soon-page h2{font-size:24px;color:var(--text);margin-bottom:6px}
.coming-soon-page p{font-size:14px;color:var(--text);margin-bottom:4px}
.coming-soon-page span{font-size:13px;color:var(--muted);line-height:1.6}

/* LOG TROUBLESHOOT */
#page-logs .logs-toolbar{padding:0 18px 18px;display:grid;grid-template-columns:minmax(220px,1.4fr) minmax(150px,.8fr) minmax(130px,.8fr) minmax(110px,.6fr);gap:12px}
#page-logs .logs-toolbar input,#page-logs .logs-toolbar select{width:100%;min-width:0}
.log-list{display:grid}
.log-bulk-actions{padding:0 18px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.log-select-all{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-weight:700}
.log-select-all input,.log-select-check{width:16px;height:16px;accent-color:var(--accent)}
.log-selected-count{font-size:12px;color:var(--muted)}
.log-card{padding:16px 18px;border-bottom:1px solid var(--line);display:grid;gap:12px;min-width:0}
.log-card-main{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;min-width:0}
.log-card-copy{display:grid;gap:8px;min-width:0}
.log-card-tags{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0}
.log-level-pill{font-size:11px;padding:4px 8px;border-radius:999px;font-weight:700;text-transform:uppercase}
.log-source-pill{font-size:11px;padding:4px 8px;border-radius:999px;background:color-mix(in srgb, var(--panel-soft) 88%, transparent);border:1px solid var(--line);color:var(--text);font-weight:600}
.log-scope{font-size:11px;color:var(--muted);overflow-wrap:anywhere}
.log-message{font-size:14px;font-weight:700;color:var(--text);overflow-wrap:anywhere}
.log-detail{font-size:12px;color:var(--muted);line-height:1.55;overflow-wrap:anywhere;white-space:pre-wrap}
.log-card-meta{text-align:right;min-width:180px;color:var(--muted)}
.log-card-meta-time{font-size:12px}
.log-card-meta-line{font-size:11px;margin-top:5px;overflow-wrap:anywhere}
.sync-log-card{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line);min-width:0}
.sync-log-left{display:flex;align-items:flex-start;gap:10px;min-width:0}
.sync-log-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sync-log-copy{min-width:0}
.sync-log-title{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sync-log-router{font-size:13px;font-weight:500;color:var(--text);overflow-wrap:anywhere}
.sync-log-status{font-size:11px;padding:2px 6px;border-radius:4px}
.sync-log-message{font-size:12px;color:var(--muted);margin-top:2px;overflow-wrap:anywhere}
.sync-log-meta{text-align:right;flex-shrink:0;color:var(--muted)}
.sync-log-time{font-size:12px}
.sync-log-stats{font-size:11px;font-family:monospace}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{border-radius:22px;padding:22px;cursor:pointer;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;color:var(--stat-text);border:1px solid var(--stat-ring);box-shadow:0 20px 40px -24px var(--stat-glow)}
.stat-card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,var(--stat-sheen),transparent 34%,transparent 72%,rgba(15,23,42,.08));pointer-events:none}
.stat-card::after{content:"";position:absolute;width:160px;height:160px;right:-42px;top:-54px;border-radius:999px;background:radial-gradient(circle,var(--stat-sheen),transparent 68%);opacity:.95;pointer-events:none}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 28px 60px -30px var(--stat-glow)}
.stat-card .ico{position:absolute;right:14px;top:14px;opacity:.22;transform:scale(1.02)}
.stat-card .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-card .val{font-size:40px;font-weight:800;line-height:1;margin-bottom:10px;color:var(--stat-text);text-shadow:0 8px 24px rgba(15,23,42,.18)}
.stat-card .hint{font-size:11px;opacity:.95;color:var(--stat-muted)}
.c-blue{background:
  radial-gradient(circle at 18% 18%, color-mix(in srgb, var(--stat-blue-a) 78%, white 22%), transparent 34%),
  linear-gradient(145deg,var(--stat-blue-a),var(--stat-blue-b) 62%, color-mix(in srgb, var(--stat-blue-b) 88%, black 12%))}
.c-green{background:
  radial-gradient(circle at 18% 18%, color-mix(in srgb, var(--stat-green-a) 78%, white 22%), transparent 34%),
  linear-gradient(145deg,var(--stat-green-a),var(--stat-green-b) 62%, color-mix(in srgb, var(--stat-green-b) 88%, black 12%))}
.c-red{background:
  radial-gradient(circle at 18% 18%, color-mix(in srgb, var(--stat-red-a) 78%, white 22%), transparent 34%),
  linear-gradient(145deg,var(--stat-red-a),var(--stat-red-b) 62%, color-mix(in srgb, var(--stat-red-b) 88%, black 12%))}
.c-amber{background:
  radial-gradient(circle at 18% 18%, color-mix(in srgb, var(--stat-amber-a) 78%, white 22%), transparent 34%),
  linear-gradient(145deg,var(--stat-amber-a),var(--stat-amber-b) 62%, color-mix(in srgb, var(--stat-amber-b) 88%, black 12%))}

/* DASHBOARD NOC */
.dashboard-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;padding:18px 20px;border-radius:20px;background:
  radial-gradient(circle at top left,color-mix(in srgb, var(--accent) 18%, transparent),transparent 36%),
  linear-gradient(180deg,color-mix(in srgb, var(--panel) 96%, transparent),color-mix(in srgb, var(--panel-soft) 92%, transparent));
  border:1px solid var(--panel-border);box-shadow:0 14px 36px rgba(2,6,23,.14)}
.dashboard-kicker{font-size:28px;font-weight:800;line-height:1.1;color:var(--text);letter-spacing:-.02em}
.dashboard-sub{font-size:14px;color:var(--muted);margin-top:6px}
.dashboard-hero-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
.dashboard-clock{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:16px;background:color-mix(in srgb, var(--panel-soft) 82%, transparent);border:1px solid var(--line)}
.dashboard-clock-time{font-size:28px;font-weight:800;line-height:1;color:var(--text);font-variant-numeric:tabular-nums}
.dashboard-clock-date{font-size:13px;color:var(--muted);font-weight:600}
.dashboard-live-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;background:color-mix(in srgb, var(--accent-soft) 88%, transparent);border:1px solid color-mix(in srgb, var(--accent) 32%, transparent);font-size:12px;font-weight:700;color:var(--text)}
.dashboard-grid-top,.dashboard-grid-bottom{display:grid;gap:16px}
.dashboard-grid-top{grid-template-columns:1.6fr 1fr;margin-bottom:16px}
.dashboard-grid-bottom{grid-template-columns:1.25fr .95fr}
.dashboard-chart-meta{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.dashboard-chip{padding:12px 14px;border-radius:14px;background:color-mix(in srgb, var(--panel-soft) 84%, transparent);border:1px solid var(--line)}
.dashboard-chip .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.dashboard-chip .value{font-size:18px;font-weight:800;color:var(--text)}
.dashboard-chart-wrap{height:280px;position:relative}
.dashboard-router-kpis{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px}
.router-kpi{padding:12px 14px;border-radius:14px;background:linear-gradient(180deg,color-mix(in srgb, var(--panel-soft) 92%, transparent),color-mix(in srgb, var(--panel) 94%, transparent));border:1px solid var(--line)}
.router-kpi .name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px}
.router-kpi .meta{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--muted)}
.router-kpi .bar{height:7px;border-radius:999px;background:color-mix(in srgb, var(--line) 70%, transparent);overflow:hidden;margin-top:9px}
.router-kpi .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#10b981,#22c55e)}
.issue-overview-grid{display:grid;grid-template-columns:.92fr 1.08fr;gap:14px;align-items:start}
.issue-donut-wrap{padding:14px;border-radius:16px;background:color-mix(in srgb, var(--panel-soft) 78%, transparent);border:1px solid var(--line)}
.donut-shell{height:180px;position:relative}
.issue-legend{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.issue-stat{padding:10px;border-radius:12px;background:color-mix(in srgb, var(--panel) 88%, transparent);border:1px solid var(--line);text-align:center}
.issue-stat .n{font-size:18px;font-weight:800;color:var(--text);margin-top:3px}
.issue-latency{margin-top:12px}
.issue-latency h4,.issue-list h4{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.issue-latency-item,.issue-list-item{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.issue-latency-item:last-child,.issue-list-item:last-child{border-bottom:none;padding-bottom:0}
.issue-map-card{padding:14px;border-radius:16px;background:color-mix(in srgb, var(--panel-soft) 78%, transparent);border:1px solid var(--line)}
.issue-map{position:relative;height:180px;border-radius:16px;border:1px solid var(--line);background:
  radial-gradient(circle at 20% 38%, rgba(239,68,68,.3), transparent 16%),
  radial-gradient(circle at 40% 58%, rgba(234,179,8,.26), transparent 18%),
  radial-gradient(circle at 68% 44%, rgba(239,68,68,.38), transparent 18%),
  radial-gradient(circle at 58% 72%, rgba(34,197,94,.22), transparent 14%),
  linear-gradient(180deg,color-mix(in srgb, var(--panel) 96%, transparent),color-mix(in srgb, var(--bg) 94%, transparent));
  overflow:hidden}
.issue-map::before{content:"";position:absolute;inset:18px;background:
  linear-gradient(90deg,transparent 0 12%, rgba(148,163,184,.06) 12% 13%, transparent 13% 28%, rgba(148,163,184,.06) 28% 29%, transparent 29% 42%, rgba(148,163,184,.06) 42% 43%, transparent 43% 57%, rgba(148,163,184,.06) 57% 58%, transparent 58%),
  linear-gradient(180deg,transparent 0 20%, rgba(148,163,184,.06) 20% 21%, transparent 21% 41%, rgba(148,163,184,.06) 41% 42%, transparent 42% 66%, rgba(148,163,184,.06) 66% 67%, transparent 67%);
  border-radius:12px;opacity:.8}
.issue-node{position:absolute;display:flex;align-items:center;justify-content:center;min-width:34px;height:34px;padding:0 10px;border-radius:999px;font-size:11px;font-weight:800;color:#fff;border:1px solid rgba(255,255,255,.18);box-shadow:0 10px 24px rgba(15,23,42,.24);backdrop-filter:blur(8px)}
.issue-node.ok{background:rgba(34,197,94,.84)}
.issue-node.warn{background:rgba(245,158,11,.84)}
.issue-node.crit{background:rgba(239,68,68,.88)}
.noc-table td,.noc-table th{white-space:nowrap}
.noc-cell-main{font-weight:700;color:var(--text)}
.noc-cell-sub{font-size:11px;color:var(--muted);margin-top:2px}
.noc-load{display:flex;align-items:center;gap:10px}
.noc-load-bar{width:74px;height:8px;border-radius:999px;background:color-mix(in srgb, var(--line) 72%, transparent);overflow:hidden}
.noc-load-bar > span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444)}
.log-feed{max-height:460px;overflow:auto}
.log-entry{padding:14px 16px;border-bottom:1px solid var(--line)}
.log-entry:last-child{border-bottom:none}
.log-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.log-title{font-size:13px;font-weight:700;color:var(--text);word-break:break-word}
.log-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:11px;color:var(--muted)}
.log-msg{font-size:12px;color:var(--text);margin-top:8px;line-height:1.55;word-break:break-word}
.health-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
.health-card{padding:12px 14px;border-radius:14px;background:color-mix(in srgb, var(--panel-soft) 84%, transparent);border:1px solid var(--line)}
.health-card .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.health-card .v{font-size:18px;font-weight:800;color:var(--text);margin-top:4px}
.health-card .s{font-size:11px;color:var(--muted);margin-top:4px}
.issue-score{font-size:12px;font-weight:800}
.issue-score.good{color:#22c55e}
.issue-score.warn{color:#f59e0b}
.issue-score.bad{color:#ef4444}

/* PANEL */
.panel{background:linear-gradient(180deg,var(--panel-grad-top),var(--panel-grad-bottom));border:1px solid var(--panel-border);border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 12px 28px rgba(2,6,23,.16)}
.panel-hdr{padding:16px 18px;border-bottom:1px solid var(--panel-border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.panel-hdr h3{font-size:14px;font-weight:600;color:var(--text)}
.panel-body{padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:16px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;background:color-mix(in srgb, var(--panel-soft) 70%, transparent);white-space:nowrap}
.tbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--line)}
.tbl tbody tr:hover{background:rgba(255,255,255,.02)}
.tbl tbody tr:last-child td{border-bottom:none}
.overflow-x{overflow-x:auto}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.b-online{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.b-offline{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.b-isolir{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.b-active{background:rgba(16,185,129,.15);color:#34d399}
.b-inactive{background:rgba(100,116,139,.15);color:#94a3b8}
.b-sa{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.b-admin{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.b-tek{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.b-view{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.3)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;border:none;transition:all .15s;cursor:pointer}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#ea580c;color:#fff}.btn-primary:hover{background:#c2410c}
.btn-secondary{background:var(--panel-soft);color:var(--text);border:1px solid var(--line-soft)}.btn-secondary:hover{background:color-mix(in srgb, var(--panel-soft) 82%, var(--line-soft))}
.btn-blue{background:#1d4ed8;color:#fff}.btn-blue:hover{background:#1e40af}
.btn-red{background:#dc2626;color:#fff}.btn-red:hover{background:#b91c1c}
.btn-green{background:#059669;color:#fff}.btn-green:hover{background:#047857}
.btn-purple{background:#7c3aed;color:#fff}.btn-purple:hover{background:#6d28d9}
.btn-sm{padding:4px 8px;font-size:11px;gap:3px;border-radius:6px}
.btn-sm svg{width:11px;height:11px}
.btn-ont{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;border:none;padding:4px 8px;border-radius:5px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px;transition:all .15s;cursor:pointer}
.btn-ont:hover{box-shadow:0 2px 8px rgba(14,165,233,.4)}
.btn-ont svg{width:11px;height:11px}
.gap-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* FORMS */
.form-lbl{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px}
.form-inp{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--input-text);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
.form-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent)}
select.form-inp option{background:var(--input-bg);color:var(--input-text)}

/* TOGGLE */
.toggle{position:relative;display:inline-block;width:42px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle-sl{position:absolute;inset:0;background:var(--line-soft);border-radius:11px;cursor:pointer;transition:.2s}
.toggle-sl:before{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-sl{background:#ea580c}
.toggle input:checked+.toggle-sl:before{transform:translateX(20px)}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:16px}

.modal-hdr h3{font-size:15px;font-weight:600;color:var(--text)}
.modal-body{padding:20px 22px;max-height:60vh;overflow-y:auto}
.modal-ftr{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex}

.form-row{margin-bottom:14px}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}

/* PAGINATION */
.pagination{display:flex;gap:4px}
.pg-btn{min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px;font-weight:500;background:var(--panel-soft);color:var(--muted);border:1px solid var(--line-soft);cursor:pointer;padding:0 8px;transition:all .1s}
.pg-btn:hover:not(:disabled){background:color-mix(in srgb, var(--panel-soft) 82%, var(--line-soft));color:var(--text)}
.pg-btn.active{background:#ea580c;color:#fff;border-color:#ea580c}
.pg-btn:disabled{opacity:.35;cursor:not-allowed}

/* PROGRESS */
.progress{height:4px;background:color-mix(in srgb, var(--line) 70%, transparent);border-radius:2px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}

/* TRAFFIC CARD */
.traffic-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s}
.traffic-card:hover{border-color:var(--line-soft)}
.traffic-card.sel{border-color:#ea580c}

/* ONT MODAL */
.ont-modal{display:none;position:fixed;inset:0;background:#000;z-index:500;flex-direction:column}
.ont-modal.show{display:flex}
.ont-hdr{background:var(--panel);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ont-toolbar{display:flex;align-items:center;gap:6px;background:var(--panel);padding:6px 12px;border-bottom:1px solid var(--line);flex-shrink:0}
.ont-body{flex:1;position:relative;overflow:hidden;background:var(--panel-soft)}
.ont-iframe{width:100%;height:100%;border:none;background:#fff}
.ont-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--panel)}
.ont-spinner{width:36px;height:36px;border:3px solid var(--line-soft);border-top-color:#0ea5e9;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LIVE DOT */
.dot-live{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;pointer-events:none}
.toast-box{display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;min-width:240px;box-shadow:0 10px 30px rgba(0,0,0,.4)}

.toast-hide{display:none}
